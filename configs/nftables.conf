#!/usr/sbin/nft -f
# 原子性应用：先 flush 再加载，中间不会有裸露窗口
flush ruleset

# ─────────────────────────────────────────────────────────────────────────────
# 第一道防线：netdev ingress（L2，优先级 -500，早于 conntrack/defrag）
# 用于丢弃明确的垃圾包，节省后续 CPU
# 需要将 eth0 替换为实际出口网卡名
# ─────────────────────────────────────────────────────────────────────────────
table netdev edge {
    define WAN = eth0
    chain ingress {
        type filter hook ingress device $WAN priority -500; policy accept;

        # IP 分片包（用于碎片攻击）
        ip frag-off & 0x1fff != 0 ct state new counter drop comment "drop suspicious fragments"

        # Bogon 源地址（RFC 规定不应出现在公网的地址）
        ip saddr {
            0.0.0.0/8,
            100.64.0.0/10,
            127.0.0.0/8,
            169.254.0.0/16,
            192.0.0.0/24,
            192.0.2.0/24,
            198.18.0.0/15,
            198.51.100.0/24,
            203.0.113.0/24,
            224.0.0.0/3
        } counter drop comment "drop bogon sources"

        # TCP 异常 flag 组合
        tcp flags & (fin|psh|urg) == fin|psh|urg counter drop comment "TCP XMAS"
        tcp flags & (fin|syn|rst|psh|ack|urg) == 0x0 counter drop comment "TCP NULL"

        # 异常 MSS（通常是 SYN flood / OS 指纹扫描）
        tcp flags syn tcp option maxseg size 1-200 counter drop comment "abnormal MSS (tightened)"
    }
}

# ─────────────────────────────────────────────────────────────────────────────
# 第二道防线：mangle prerouting（conntrack 可用，-150 优先级）
# 在路由决策前丢弃 conntrack 认定为 invalid 的包
# ─────────────────────────────────────────────────────────────────────────────
table inet mangle {
    chain prerouting {
        type filter hook prerouting priority -150;

        # conntrack 标记为 invalid 的包
        ct state invalid counter drop comment "drop ct invalid"

        # 非 SYN 的新连接（半开包、重放攻击）
        tcp flags & (fin|syn|rst|ack) != syn ct state new counter drop comment "drop non-SYN new"
    }
}

# ─────────────────────────────────────────────────────────────────────────────
# 主防火墙：inet filter（IPv4 + IPv6 统一处理）
# ─────────────────────────────────────────────────────────────────────────────
table inet filter {

    # ── 数据集 ────────────────────────────────────────────────────────────────

    # 内网地址段（shadow-tls 容器网络）
    set lan4 {
        type ipv4_addr; flags interval
        elements = { 10.89.0.0/24 }
    }
    set lan6 {
        type ipv6_addr; flags interval
        elements = { fd4c:e4a6:dd64:762c::/64 }
    }

    # 对外开放的 TCP/UDP 端口
    set ports_web {
        type inet_service; flags interval
        elements = { 80 }
    }
    set ports_proxy {
        type inet_service; flags interval
        elements = { 443, 8000, 8443 }
    }

    # ── vmap 分发（比 if/else 链更快，O(1) 查表）─────────────────────────────
    map proto_dispatch {
        type inet_proto : verdict
        elements = { tcp : jump tcp_in, udp : jump udp_in }
    }

    # ── input 链 ──────────────────────────────────────────────────────────────
    chain input {
        type filter hook input priority filter; policy drop;

        # 本地回环
        iif "lo" accept comment "loopback"

        # 防止伪造回环源地址（lo 以外的包不应以 127/8 为目的）
        iif != "lo" ip  daddr 127.0.0.0/8   drop comment "anti-spoof loopback v4"
        iif != "lo" ip6 daddr ::1/128        drop comment "anti-spoof loopback v6"

        # 已建立 / 相关联的连接（状态跟踪，放行回包）
        ct state { established, related } accept comment "stateful allow"

        # ICMP：仅允许必要类型，ping 限速防泛洪
        icmp type echo-request limit rate 10/second burst 20 packets accept
        icmp  type echo-request drop comment "ping flood"
        icmp  type { destination-unreachable, time-exceeded, parameter-problem } accept
        icmpv6 type { destination-unreachable, packet-too-big, time-exceeded,
                      parameter-problem, echo-request, echo-reply,
                      nd-router-advert, nd-neighbor-solicit, nd-neighbor-advert } accept
        ip protocol igmp accept comment "IGMP multicast"

        # 内网直通（容器互访不经过端口过滤）
        ip  saddr @lan4 ip  daddr @lan4 accept comment "shadow-tls internal v4"
        ip6 saddr @lan6 ip6 daddr @lan6 accept comment "shadow-tls internal v6"

        # 按协议分发到子链
        meta l4proto vmap @proto_dispatch
    }

    # ── forward 链 ────────────────────────────────────────────────────────────
    chain forward {
        type filter hook forward priority filter; policy drop;

        ct state { established, related } accept comment "stateful forward"
        ip  saddr @lan4 ip  daddr @lan4 accept comment "shadow-tls forward v4"
        ip6 saddr @lan6 ip6 daddr @lan6 accept comment "shadow-tls forward v6"
    }

    # ── output 链 ─────────────────────────────────────────────────────────────
    chain output {
        type filter hook output priority filter; policy accept;
        # 本机出站默认放行，如需限制出站可在此添加规则
    }

    # ── TCP 子链 ──────────────────────────────────────────────────────────────
    chain tcp_in {
        # SSH：限速防暴力破解（10 次/分钟），记日志便于审计
        tcp dport 22 ct state new \
            limit rate 10/minute \
            log prefix "ssh-new: " level info \
            accept comment "SSH rate-limited"

        tcp dport @ports_web   accept comment "HTTP"
        tcp dport @ports_proxy accept comment "proxy TCP"

        tcp flags syn ct state new limit rate 100/second burst 200 accept comment "syn flood protect"
        tcp flags syn drop comment "drop excessive syn"

        # 明确拒绝并发 RST，避免客户端长时间等待
        reject with tcp reset comment "reject other TCP"
    }

    # ── UDP 子链 ──────────────────────────────────────────────────────────────
    chain udp_in {
        udp dport @ports_proxy accept comment "proxy UDP (QUIC)"
        drop comment "drop other UDP"
    }
}