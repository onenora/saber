# 2026-3-3 update
[general]
#配置图标
profile_img_url=https://ikuns.netlify.app/img/logo.png
# 网络检查测试
network_check_url =http://bing.com
server_check_url =http://www.google.com/generate_204
server_check_user_agent = Agent/1.0
server_check_timeout = 5000
fallback_udp_policy=reject

# 资源解析器
resource_parser_url=https://raw.githubusercontent.com/KOP-XIAO/QuantumultX/master/Scripts/resource-parser.js
#获取并展示节点信息的js
geo_location_checker=http://ip-api.com/json/?lang=zh-CN, https://raw.githubusercontent.com/limbopro/QuantumultX/master/Scripts/IP_API.js
#排除路由
excluded_routes= 10.0.0.0/8, 17.0.0.0/8, 24.105.30.129/32, 100.64.0.0/10, 172.16.0.0/12, 182.162.132.1/32, 185.60.112.157/32, 185.60.112.158/32,192.168.0.0/16,239.255.255.250/32
# dns排除列表
dns_exclusion_list=*.cmpassport.com, *.jegotrip.com.cn, *.icitymobile.mobi, id6.me, *.pingan.com.cn,*.localnetwork.uop, *.qq.com, qq.com

# 保守式
#udp_whitelist=53, 123, 1900, 80-443
# 开放式 （MOBA、FPS游戏选择此或全部注释）
#udp_whitelist=53,123,81-442,444-65535
# ICMP自动回复
icmp_auto_reply = true
#自定义 DoH 的 User Agent
doh_user_agent=Agent/1.0
# udp服务策略
udp_drop_list = 443, STUN, QUIC
#geoip-cn数据库
;https://raw.githubusercontent.com/NobyDa/geoip/release/Private-GeoIP-CN.mmdb
;https://github.com/Hackl0us/GeoIP2-CN/raw/release/Country.mmdb
[dns]
; 禁用系统 DNS 以及 ipv6
no-system
no-ipv6
#设置DoH服务器后，所有其他常规DNS服务器设置将被忽略；当设置了多个DoH服务器时，只会使用第一个；当使用的 DoH服务器不是基于HTTP/2时，DoH将被暂时禁用。
#腾讯 DoH(稳)
;doh-server=https://doh.pub/dns-query
#阿里 DoH(快)
;doh-server=https://dns.alidns.com/dns-query
# Google DoH
#doh-server=https://dns.google/dns-query
#AdGuard DoH 过滤广告和跟踪
#doh-server=https://dns.adguard.com/dns-query
#AdGuard DNS DoQ (DNS over QUIC)
;doq-server=quic://dns.adguard.com

#指定的 ipv4 DNS服务器，DOH启用以下失效
#騰讯
server=119.29.29.29
server=182.254.116.116
#阿里
server=223.5.5.5
server=223.6.6.6
#Google
;server=8.8.8.8

#用于过滤如 127.0.0.1/0.0.0.0 类可能被污染的返回结果
circumvent-ipv4-answer=127.0.0.1, 0.0.0.0
circumvent-ipv6-answer=::

;指定域名解析dns
server=/*.taobao.com/223.5.5.5
server=/*.tmall.com/223.5.5.5
server=/*.qq.com/119.28.28.28
server=/*.weixin.com/119.28.28.28
server=/*.163.com/119.29.29.29
server=/*.netease.com/119.29.29.29
server=/*icloud.com/119.29.29.29
server=/*icloud.com.cn/119.29.29.29
server=/*tencent.com/119.29.29.29
server=/*.alipay.com/223.5.5.5
server=/*.alicdn.com/223.5.5.5
server=/*.aliyun.com/223.5.5.5

